<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckLoops Admin Importer</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #5b6475;
      --line: #dde3ef;
      --accent: #0b6ef3;
      --accent-2: #0958c3;
      --good: #0f7b38;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: linear-gradient(165deg, #eef4ff 0%, #f8fafc 70%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 36px 16px 56px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      line-height: 1.2;
    }
    p { margin: 0 0 14px; color: var(--muted); }
    label { font-weight: 600; display: block; margin: 14px 0 8px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cdd5e1;
      border-radius: 10px;
      font-size: 0.98rem;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      margin-top: 16px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 11px 16px;
      cursor: pointer;
    }
    button:hover { background: var(--accent-2); }
    .status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f9fbff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ok { color: var(--good); }
    .bad { color: var(--bad); }
    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.92em;
    }
    @media (max-width: 720px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>CheckLoops Admin Importer</h1>
      <p>Trigger the GitHub Action that downloads NHS CSV files and upserts one GP practice to Supabase.</p>
      <p>Everything runs in GitHub Actions, not on your local computer.</p>

      <label for="owner">GitHub Owner</label>
      <input id="owner" value="MagicManBen" />

      <label for="repo">GitHub Repo</label>
      <input id="repo" value="CheckLoopsAdmin" />

      <div class="row">
        <div>
          <label for="branch">Branch</label>
          <input id="branch" value="main" />
        </div>
        <div>
          <label for="ods">ODS Code</label>
          <input id="ods" value="M83076" />
        </div>
      </div>

      <label for="token">GitHub Token (needs <code>actions:write</code> on this repo)</label>
      <input id="token" type="password" placeholder="ghp_..." />

      <button id="runBtn" type="button">Run Import Workflow</button>
      <div id="status" class="status">Ready.</div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const fields = ["owner", "repo", "branch", "ods"];

    fields.forEach((id) => {
      const key = `checkloops_${id}`;
      const el = document.getElementById(id);
      const saved = localStorage.getItem(key);
      if (saved) el.value = saved;
      el.addEventListener("input", () => localStorage.setItem(key, el.value.trim()));
    });

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = `status ${isError ? "bad" : "ok"}`;
    }

    document.getElementById("runBtn").addEventListener("click", async () => {
      const owner = document.getElementById("owner").value.trim();
      const repo = document.getElementById("repo").value.trim();
      const branch = document.getElementById("branch").value.trim() || "main";
      const ods = document.getElementById("ods").value.trim().toUpperCase();
      const token = document.getElementById("token").value.trim();

      if (!owner || !repo || !branch || !ods || !token) {
        setStatus("Fill in all fields first.", true);
        return;
      }

      setStatus("Dispatching workflow...");
      const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/import-one-gp.yml/dispatches`;
      const payload = {
        ref: branch,
        inputs: { ods_code: ods }
      };

      try {
        const r = await fetch(url, {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": `Bearer ${token}`,
            "X-GitHub-Api-Version": "2022-11-28",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!r.ok) {
          const body = await r.text();
          throw new Error(`GitHub API ${r.status}: ${body}`);
        }

        setStatus(`Workflow started for ${ods}.
Check Actions tab:
https://github.com/${owner}/${repo}/actions`);
      } catch (err) {
        setStatus(String(err), true);
      }
    });
  </script>
</body>
</html>
