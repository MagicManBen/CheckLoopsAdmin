name: Import NHS.uk GP Profile

on:
  workflow_dispatch:
    inputs:
      practice_code:
        description: "GP practice ODS code (example: M83076)"
        required: true
        default: "M83076"
      nhs_api_base:
        description: "NHS API platform base URL (sandbox or production)"
        required: true
        default: "https://sandbox.api.service.nhs.uk"
      nhs_token_url:
        description: "OAuth token endpoint (leave default to derive from base URL)"
        required: false
        default: ""
      nhs_search_path:
        description: "Search endpoint path (relative to nhs_api_base)"
        required: true
        default: "/directory-of-services-search-api/v3/Organisations"
      nhs_api_version:
        description: "API version query parameter"
        required: true
        default: "3"

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run NHS profile importer
        env:
          PRACTICE_CODE: ${{ github.event.inputs.practice_code }}
          NHS_API_BASE: ${{ github.event.inputs.nhs_api_base }}
          NHS_TOKEN_URL: ${{ github.event.inputs.nhs_token_url }}
          NHS_SEARCH_PATH: ${{ github.event.inputs.nhs_search_path }}
          NHS_API_VERSION: ${{ github.event.inputs.nhs_api_version }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_KEY }}
          NHS_API_KEY: ${{ secrets.NHS_API_KEY }}
          NHS_PRIVATE_KEY_PEM: ${{ secrets.NHS_PRIVATE_KEY_PEM }}
          NHS_KID: ${{ secrets.NHS_KID }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets."
            exit 1
          fi
          if [ -z "$NHS_API_KEY" ]; then
            echo "Missing required NHS_API_KEY secret (client_id from NHS Developer console)."
            exit 1
          fi
          if [ -z "$NHS_PRIVATE_KEY_PEM" ]; then
            echo "Missing required NHS_PRIVATE_KEY_PEM secret (PEM-encoded RSA private key)."
            exit 1
          fi
          if [ -z "$PRACTICE_CODE" ]; then
            echo "Missing practice_code."
            exit 1
          fi
          node scripts/import_nhs_profile.mjs
