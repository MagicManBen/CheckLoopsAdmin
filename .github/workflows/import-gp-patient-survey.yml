name: Import GP Patient Survey Metrics

on:
  workflow_dispatch:
    inputs:
      practice_code:
        description: "GP practice ODS code (example: M83076)"
        required: true
        default: "M83076"
      survey_year:
        description: "Survey year"
        required: true
        default: "2025"
      publication_label:
        description: "Publication label"
        required: true
        default: "GP Patient Survey 2025 Practice Data (weighted)"
      survey_csv_url:
        description: "Public GP Patient Survey practice CSV URL"
        required: true
        default: "https://gp-patient.co.uk/FileDownload/Download?fileRedirect=2025%2Fsurvey-results%2Fpractice-results%2Fpractice-data-csv%2FGPPS_2025_Practice_data_(weighted)_(csv)_PUBLIC.csv"

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run GP patient survey importer
        env:
          PRACTICE_CODE: ${{ github.event.inputs.practice_code }}
          SURVEY_YEAR: ${{ github.event.inputs.survey_year }}
          PUBLICATION_LABEL: ${{ github.event.inputs.publication_label }}
          SURVEY_CSV_URL: ${{ github.event.inputs.survey_csv_url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$PRACTICE_CODE" ] || [ -z "$SURVEY_YEAR" ] || [ -z "$SURVEY_CSV_URL" ]; then
            echo "Missing required environment values."
            echo "Secrets required: SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          node scripts/import_gp_patient_survey.mjs
